<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <style>
    .bg { fill: #0b0f19; }
    .grid-line { stroke: rgba(97, 175, 239, 0.05); stroke-width: 0.5; }
    .orbit {
      fill: none;
      stroke: rgba(97, 175, 239, 0.25);
      stroke-width: 1;
      stroke-dasharray: 4 6;
      transform-origin: 150px 125px;
      animation: spin 30s linear infinite;
    }
    .orbit-mars {
      fill: none;
      stroke: rgba(224, 108, 117, 0.3);
      stroke-width: 1;
      stroke-dasharray: 6 4;
      transform-origin: 650px 125px;
      animation: spin-reverse 45s linear infinite;
    }
    .link-line {
      fill: none;
      stroke: rgba(97, 175, 239, 0.15);
      stroke-width: 1.5;
    }
    .data-flow {
      fill: none;
      stroke: #61afef;
      stroke-width: 2.5;
      stroke-dasharray: 12 180;
      animation: flow 5s linear infinite;
    }
    .data-flow-reverse {
      fill: none;
      stroke: #e5c07b;
      stroke-width: 2.5;
      stroke-dasharray: 12 140;
      animation: flow-reverse 6s linear infinite;
    }
    .node-pulse {
      animation: pulse 3s ease-in-out infinite;
    }
    .planet {
      filter: drop-shadow(0 0 8px currentColor);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes flow {
      from { stroke-dashoffset: 350; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes flow-reverse {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: 350; }
    }
    @keyframes pulse {
      0%, 100% { r: 6; opacity: 0.3; }
      50% { r: 18; opacity: 0.7; }
    }
  </style>
  
  <!-- Background -->
  <rect width="800" height="250" rx="12" class="bg" />
  
  <!-- Grid pattern -->
  <line x1="0" y1="50" x2="800" y2="50" class="grid-line" />
  <line x1="0" y1="100" x2="800" y2="100" class="grid-line" />
  <line x1="0" y1="150" x2="800" y2="150" class="grid-line" />
  <line x1="0" y1="200" x2="800" y2="200" class="grid-line" />
  <line x1="100" y1="0" x2="100" y2="250" class="grid-line" />
  <line x1="200" y1="0" x2="200" y2="250" class="grid-line" />
  <line x1="300" y1="0" x2="300" y2="250" class="grid-line" />
  <line x1="400" y1="0" x2="400" y2="250" class="grid-line" />
  <line x1="500" y1="0" x2="500" y2="250" class="grid-line" />
  <line x1="600" y1="0" x2="600" y2="250" class="grid-line" />
  <line x1="700" y1="0" x2="700" y2="250" class="grid-line" />

  <!-- Communication Link Paths -->
  <path id="path1" d="M 150 125 Q 235 100 320 75" class="link-line" />
  <path id="path2" d="M 320 75 Q 400 125 480 175" class="link-line" />
  <path id="path3" d="M 480 175 Q 565 150 650 125" class="link-line" />
  
  <path d="M 150 125 Q 400 200 650 125" class="link-line" style="stroke: rgba(152, 195, 121, 0.08); stroke-dasharray: 5 5;" />

  <!-- Animated Data Flows -->
  <path d="M 150 125 Q 235 100 320 75" class="data-flow" />
  <path d="M 320 75 Q 400 125 480 175" class="data-flow" />
  <path d="M 480 175 Q 565 150 650 125" class="data-flow" />
  
  <path d="M 650 125 Q 565 150 480 175" class="data-flow-reverse" />
  <path d="M 480 175 Q 400 125 320 75" class="data-flow-reverse" />
  <path d="M 320 75 Q 235 100 150 125" class="data-flow-reverse" />

  <!-- Orbits -->
  <circle cx="150" cy="125" r="45" class="orbit" />
  <circle cx="650" cy="125" r="35" class="orbit-mars" />

  <!-- Node Pulse Glows -->
  <circle cx="150" cy="125" r="10" fill="#61afef" class="node-pulse" style="animation-delay: 0s;" />
  <circle cx="320" cy="75" r="10" fill="#c678dd" class="node-pulse" style="animation-delay: 1s;" />
  <circle cx="480" cy="175" r="10" fill="#98c379" class="node-pulse" style="animation-delay: 2s;" />
  <circle cx="650" cy="125" r="10" fill="#e06c75" class="node-pulse" style="animation-delay: 0.5s;" />

  <!-- Physical Node Icons -->
  <!-- Earth Node -->
  <circle cx="150" cy="125" r="14" fill="#61afef" class="planet" color="#61afef" />
  <circle cx="150" cy="125" r="10" fill="#282c34" />
  <circle cx="150" cy="125" r="5" fill="#61afef" />

  <!-- Satellite 1 -->
  <circle cx="320" cy="75" r="7" fill="#c678dd" class="planet" color="#c678dd" />
  <circle cx="320" cy="75" r="3" fill="#282c34" />

  <!-- Satellite 2 -->
  <circle cx="480" cy="175" r="7" fill="#98c379" class="planet" color="#98c379" />
  <circle cx="480" cy="175" r="3" fill="#282c34" />

  <!-- Mars Node -->
  <circle cx="650" cy="125" r="11" fill="#e06c75" class="planet" color="#e06c75" />
  <circle cx="650" cy="125" r="8" fill="#282c34" />
  <circle cx="650" cy="125" r="4" fill="#e06c75" />
  
  <!-- Interactive Text Label inside SVG -->
  <text x="400" y="35" fill="#abb2bf" font-family="Fira Code, Courier New, monospace" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="2">
    DELAY-TOLERANT NETWORK SIMULATION (SPICE-NS)
  </text>
  
  <text x="400" y="225" fill="#5c6370" font-family="Fira Code, Courier New, monospace" font-size="9" text-anchor="middle" letter-spacing="1">
    SYS_STATUS: ACTIVE // PACKETS_TRANSMITTING...
  </text>
</svg>
